<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Zum Teilen auswählen</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #1c1c28;
      color: #f0f0f5;
    }
    header {
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 1px solid #2e2e3e;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 16px;
      overflow-y: auto;
      height: calc(100vh - 110px);
      box-sizing: border-box;
    }
    .item {
      background: #26263a;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .item:hover { background: #303048; border-color: #6c6cff; }
    .item img {
      width: 100%;
      height: 124px;
      object-fit: contain;
      background: #000;
      border-radius: 4px;
      display: block;
    }
    .item .name {
      margin-top: 6px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    footer {
      padding: 10px 18px;
      border-top: 1px solid #2e2e3e;
      text-align: right;
    }
    button {
      background: #3a3a52;
      color: #f0f0f5;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #45456a; }
    .empty { padding: 40px; text-align: center; color: #9a9ab0; }
  </style>
</head>
<body>
  <header>Bildschirm oder Fenster zum Teilen auswählen</header>
  <div class="grid" id="grid"></div>
  <footer><button id="cancel">Abbrechen</button></footer>

  <script>
    const { ipcRenderer } = require('electron');
    const grid = document.getElementById('grid');

    ipcRenderer.invoke('get-sources').then((sources) => {
      if (!sources.length) {
        grid.innerHTML = '<div class="empty">Keine teilbaren Quellen gefunden.</div>';
        return;
      }
      for (const src of sources) {
        const el = document.createElement('div');
        el.className = 'item';
        el.title = src.name;
        el.innerHTML =
          '<img src="' + src.thumbnail + '" alt="" />' +
          '<div class="name">' + src.name.replace(/</g, '&lt;') + '</div>';
        el.addEventListener('click', () => ipcRenderer.send('picker-choose', src.id));
        grid.appendChild(el);
      }
    });

    document.getElementById('cancel')
      .addEventListener('click', () => ipcRenderer.send('picker-choose', null));
  </script>
</body>
</html>
